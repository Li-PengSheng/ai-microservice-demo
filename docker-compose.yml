# version: "3.8"

services:
  # AI 模型服务
  python-ai:
    build: ./service_python
    environment:
    - OLLAMA_HOST=http://172.18.0.1:11434
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Go API 网关
  go-gateway:
    build: ./service_go
    ports:
      - "8080:8080" # 将容器的 8080 映射到宿主机的 8080
      - "6060:6060"
    depends_on:
      python-ai:
        condition: service_healthy
    environment:
      - AI_SERVICE_ADDR=python-ai:50051 # 关键：通过服务名通信
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 新增：Prometheus 时序数据库
  prometheus:
    image: prom/prometheus:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ai-network
    ports:
      - "9090:9090"

  # 新增：Grafana 可视化面板
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - ai-network
    depends_on:
      - prometheus

  # 新增：Jaeger 追踪中心
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # UI 界面，从 Windows 浏览器访问
      - "4317:4317" # OTLP 接收端口（gRPC）
    networks:
      - ai-network

  nvidia-gpu-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.1.0
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "9835:9835"
    volumes:
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi  # mount host nvidia-smi
    restart: unless-stopped
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
