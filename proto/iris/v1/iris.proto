syntax = "proto3";
package iris.v1;

option go_package = "ai-microservice-demo/service_go/gen/iris/v1;irisv1";

// 定义请求：鸢尾花的4个特征
message IrisPredictRequest {
  float sepal_length = 1;
  float sepal_width = 2;
  float petal_length = 3;
  float petal_width = 4;
}

// 定义响应：预测的类别（int 或 string）
message IrisPredictResponse {
  int32 class_id = 1;
  string class_name = 2;
}

// 定义服务接口
service IrisPredictorService {
  rpc IrisPredict(IrisPredictRequest) returns (IrisPredictResponse);
}
