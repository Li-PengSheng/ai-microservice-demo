syntax = "proto3";
package model.v1;

option go_package = "ai-microservice-demo/service_go/gen/model/v1;modelv1";

// 定义请求：用户的问题
message ModelPredictRequest {
  string prompt = 1;
}

// 定义响应：大模型的回答
message ModelPredictResponse {
  string response = 1;
  string model_name = 2;

  int32 prompt_eval_count = 3; // 输入的提示词 Token 数量
  int32 eval_count = 4;        // 模型生成的 Token 数量
  int64 eval_duration = 5;     // 模型生成耗时 (通常为纳秒)
}

service ModelPredictor {
  rpc ModelPredict(ModelPredictRequest) returns (ModelPredictResponse);
}
