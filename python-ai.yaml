apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-ai
  template:
    metadata:
      labels:
        app: python-ai
    spec:
      containers:
        - name: python-ai
          image: python-ai:v1
          ports:
            - containerPort: 50051 #
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: OLLAMA_HOST
              value: "http://ollama-svc:11434"
---
apiVersion: v1
kind: Service
metadata:
  name: python-ai-svc
spec:
  selector:
    app: python-ai
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051


