apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-gateway
  template:
    metadata:
      labels:
        app: go-gateway
    spec:
      containers:
        - name: go-gateway
          image: go-gateway:v2
          ports:
            - containerPort: 8080 #
          env:
            - name: AI_SERVICE_ADDR
              value: "python-ai-svc:50051" # 使用 K8s Service 名称进行内部通信
            - name: JAEGER_ENDPOINT
              value: "172.17.141.222:4317"
          livenessProbe:
            httpGet:
              path: /metrics # 借用 metrics 接口做存活检查
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: go-gateway-svc
  labels:
    app: go-gateway # 确保这里有标签供 ServiceMonitor 识别
spec:
  selector:
    app: go-gateway
  ports:
    - name: web # 必须添加这个名称
      protocol: TCP
      port: 80
      targetPort: 8080
